spring:
  application:
    name: repository-ranking-service
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

github:
  base-url: https://api.github.com
  api-version: "2026-03-10"
  token: ${GITHUB_TOKEN:}
  connect-timeout: 2s
  response-timeout: 5s
  maximum-page-size: 50
  retry:
    max-attempts: 3
    backoff-delays: 100ms,250ms

ranking:
  score-version: v1

  weights:
    stars: 0.60
    forks: 0.25
    recency: 0.15

  stars:
    reference-maximum: 100000

  forks:
    reference-maximum: 20000

  recency:
    half-life-days: 180

cache:
  ranking:
    ttl: 5m
    maximum-size: 500

logging:
  level:
    com.rf.ranking: INFO
